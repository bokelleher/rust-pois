<!DOCTYPE html>
<!--
  change-password.html - POIS forced / self-service password change
  Version: 3.12.0
  Purpose: Reached after login when the account is flagged must_change_password
           (a provisioned temp credential). Standalone auth page (no header.js);
           the backend blocks every other endpoint until the change succeeds.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POIS - Change Password</title>
  <link rel="stylesheet" href="/static/app.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .login-container { width:100%; max-width:400px; }
    .login-card { background:var(--panel); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border); border-radius:16px; padding:40px; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
    .login-header { text-align:center; margin-bottom:28px; }
    .login-title { font-size:22px; font-weight:600; color:var(--text-primary); margin-bottom:8px; }
    .login-subtitle { color:var(--text-secondary); font-size:13px; line-height:1.5; }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; margin-bottom:8px; color:var(--text-secondary); font-size:12px;
      text-transform:uppercase; letter-spacing:0.5px; font-weight:500; }
    .form-group input { width:100%; padding:12px 14px; background:var(--field-bg); border:1px solid var(--border);
      border-radius:8px; color:var(--text-primary); font-size:14px; font-family:inherit; transition:all 0.2s; }
    .form-group input:focus { outline:none; border-color:var(--primary); background:var(--field-bg-hover); }
    .hint { font-size:11px; color:var(--text-secondary); margin-top:6px; }
    .btn-login { width:100%; padding:12px; background:linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color:white; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s;
      text-transform:uppercase; letter-spacing:0.5px; }
    .btn-login:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(139,92,246,0.3); }
    .btn-login:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .btn-text { display:block; width:100%; text-align:center; margin-top:16px; background:none; border:none;
      color:var(--text-secondary); font-size:12px; cursor:pointer; }
    .error-message { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#ef4444;
      padding:12px; border-radius:8px; margin-bottom:20px; font-size:13px; display:none; }
    .success-message { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); color:#22c55e;
      padding:12px; border-radius:8px; margin-bottom:20px; font-size:13px; display:none; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="/static/images/pois.svg" alt="pois" style="height:42px; margin:0 auto 16px; display:block;">
        <div class="login-title">Set a new password</div>
        <p class="login-subtitle" id="subtitle">Your account uses a temporary password. Choose a new one to continue.</p>
      </div>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <form id="changeForm">
        <div class="form-group">
          <label for="current">Current password</label>
          <input type="password" id="current" autocomplete="current-password" required placeholder="The password you just used">
        </div>
        <div class="form-group">
          <label for="newpass">New password</label>
          <input type="password" id="newpass" autocomplete="new-password" required placeholder="At least 8 characters">
          <div class="hint">Minimum 8 characters. Must differ from your current password.</div>
        </div>
        <div class="form-group">
          <label for="confirm">Confirm new password</label>
          <input type="password" id="confirm" autocomplete="new-password" required placeholder="Re-enter the new password">
        </div>
        <button type="submit" class="btn-login" id="submitBtn">Update password</button>
        <button type="button" class="btn-text" id="logoutBtn">Sign out</button>
      </form>
    </div>
  </div>

  <script>
    (function () {
      'use strict';
      const form = document.getElementById('changeForm');
      const submitBtn = document.getElementById('submitBtn');
      const errorMessage = document.getElementById('errorMessage');
      const successMessage = document.getElementById('successMessage');
      const currentInput = document.getElementById('current');
      const newInput = document.getElementById('newpass');
      const confirmInput = document.getElementById('confirm');

      function getToken() { return localStorage.getItem('pois_token'); }
      function tokenValid() {
        const t = getToken();
        if (!t) return false;
        try {
          const p = JSON.parse(atob(t.split('.')[1]));
          return p.exp > Math.floor(Date.now() / 1000);
        } catch (e) { return false; }
      }
      // Must be authenticated to be here; otherwise back to login.
      if (!tokenValid()) { window.location.href = '/static/login.html'; return; }

      function showError(m) {
        errorMessage.textContent = m; errorMessage.style.display = 'block';
        successMessage.style.display = 'none';
      }
      function showSuccess(m) {
        successMessage.textContent = m; successMessage.style.display = 'block';
        errorMessage.style.display = 'none';
      }

      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('pois_token');
        localStorage.removeItem('pois_user');
        window.location.href = '/static/login.html';
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const current = currentInput.value;
        const next = newInput.value;
        const confirm = confirmInput.value;

        if (next.length < 8) { showError('New password must be at least 8 characters.'); return; }
        if (next !== confirm) { showError('New password and confirmation do not match.'); return; }
        if (next === current) { showError('New password must be different from the current one.'); return; }

        submitBtn.disabled = true; submitBtn.textContent = 'Updating...';
        try {
          const res = await fetch('/api/auth/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
            body: JSON.stringify({ current_password: current, new_password: next })
          });
          if (!res.ok) {
            let msg = 'Password change failed.';
            try { const j = await res.json(); msg = j.message || j.error || msg; }
            catch (_) { try { msg = await res.text(); } catch (e2) {} }
            throw new Error(msg);
          }
          // Clear the forced-change flag in the cached user so guards stop redirecting.
          try {
            const u = JSON.parse(localStorage.getItem('pois_user') || '{}');
            u.must_change_password = false;
            localStorage.setItem('pois_user', JSON.stringify(u));
          } catch (e) {}
          showSuccess('Password updated. Redirecting...');
          setTimeout(() => { window.location.href = '/static/events.html'; }, 600);
        } catch (err) {
          showError(err.message || 'Password change failed.');
          submitBtn.disabled = false; submitBtn.textContent = 'Update password';
        }
      });

      currentInput.focus();
    })();
  </script>
</body>
</html>
