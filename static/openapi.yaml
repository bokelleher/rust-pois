            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'

  /api/tools/scte35/test-send:
    post:
      tags: [SCTE-35 Tools]
      summary: Test send SCTE-35 signal
      description: Send a test SCTE-35 signal through the channel processing pipeline
      operationId: testSendScte35
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestSendRequest'
      responses:
        '200':
          description: Test send result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestSendResponse'

  # ========== Backup Endpoints ==========
  /api/backup/export/channel/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64

    post:
      tags: [Backup]
      summary: Export channel metadata
      description: Export channel configuration (metadata only, no rules)
      operationId: exportChannel
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Channel backup data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelBackup'
        '404':
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ========== System Endpoints ==========
  /healthz:
    get:
      tags: [System]
      summary: Health check
      description: Simple health check endpoint
      operationId: healthCheck
      responses:
        '200':
          description: Server is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok

  # ========== Groups / RBAC ==========
  /api/me/groups:
    get:
      tags: [Groups]
      summary: The caller's effective identity
      description: Returns whether the caller is a super-admin and the groups they belong to (with per-group role). Used by the UI to gate admin features and group pickers.
      operationId: myGroups
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyGroups'

  /api/groups:
    get:
      tags: [Groups]
      summary: List groups
      description: Super-admins see all groups; other users see only the groups they belong to.
      operationId: listGroups
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
    post:
      tags: [Groups]
      summary: Create a group (super-admin only)
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertGroup'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '403':
          description: Super-admin required

  /api/groups/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [Groups]
      summary: Get a group and its members
      description: Visible to a super-admin or a member of the group.
      operationId: getGroup
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    $ref: '#/components/schemas/Group'
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/MemberRow'
        '403':
          description: Not a member of this group
    put:
      tags: [Groups]
      summary: Rename / edit a group
      description: Super-admin or a group-admin of this group.
      operationId: updateGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupMeta'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '403':
          description: Group-admin required
    delete:
      tags: [Groups]
      summary: Soft-delete a group (super-admin only)
      operationId: deleteGroup
      responses:
        '200':
          description: Deleted
        '403':
          description: Super-admin required

  /api/groups/{id}/members:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [Groups]
      summary: List group members
      operationId: listMembers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MemberRow'
        '403':
          description: Not a member of this group
    post:
      tags: [Groups]
      summary: Add a member or change their role
      description: Super-admin or a group-admin of this group.
      operationId: addMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMember'
      responses:
        '200':
          description: Added/updated
        '403':
          description: Group-admin required

  /api/groups/{id}/members/{user_id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    delete:
      tags: [Groups]
      summary: Remove a member from a group
      description: Super-admin or a group-admin of this group. Removes membership only; the user account is kept.
      operationId: removeMember
      responses:
        '200':
          description: Removed
        '403':
          description: Group-admin required

  # ========== Sharing ==========
  /api/share/{kind}/{id}:
    parameters:
      - name: kind
        in: path
        required: true
        schema:
          type: string
          enum: [channel, project, template]
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [Sharing]
      summary: Get a resource's current sharing
      description: Returns the groups the resource is shared to, its global flag, and whether the caller may change the sharing. Requires read access.
      operationId: getShare
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareState'
        '400':
          description: Unknown share kind
        '403':
          description: Not allowed to view this resource
    put:
      tags: [Sharing]
      summary: Set a resource's sharing
      description: |
        Re-publishes the resource to the given groups (scoped merge: a non-super caller may only
        target groups they belong to, and shares to groups outside their reach are preserved).
        Only super-admins may set `is_global`. Requires write access.
      operationId: setShare
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetShareRequest'
      responses:
        '200':
          description: Updated sharing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareState'
        '403':
          description: Not allowed to change sharing, or targeting a group you don't belong to

  # ========== Projects & Templates ==========
  /api/projects:
    get:
      tags: [Projects & Templates]
      summary: List projects
      description: Returns projects the caller may read; each row is annotated with its `group_ids`.
      operationId: listProjects
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
    post:
      tags: [Projects & Templates]
      summary: Create a project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProject'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /api/projects/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [Projects & Templates]
      summary: Get a project and its templates
      operationId: getProject
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
                  templates:
                    type: array
                    items:
                      $ref: '#/components/schemas/Template'
        '403':
          description: Not allowed to view this project
    put:
      tags: [Projects & Templates]
      summary: Update a project
      description: Owner, group-admin of a shared group, or super-admin.
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectMeta'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
    delete:
      tags: [Projects & Templates]
      summary: Delete a project (its templates are kept, moved to the library)
      operationId: deleteProject
      responses:
        '200':
          description: Deleted

  /api/projects/{id}/apply:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      tags: [Projects & Templates]
      summary: Apply a project
      description: Instantiates a fresh copy of every channel template in the project (with its rules), owned by the caller and landed in the caller's group(s).
      operationId: applyProject
      responses:
        '200':
          description: Applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplyResult'

  /api/templates:
    get:
      tags: [Projects & Templates]
      summary: List templates
      description: Returns templates the caller may read; each row is annotated with its `group_ids`.
      operationId: listTemplates
      parameters:
        - name: project_id
          in: query
          schema:
            type: integer
            format: int64
        - name: kind
          in: query
          schema:
            type: string
            enum: [rule, channel]
        - name: unfiled
          in: query
          description: Only templates not filed under a project.
          schema:
            type: boolean
        - name: default
          in: query
          description: Only featured/default templates.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Template'

  /api/templates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [Projects & Templates]
      summary: Get a template
      operationId: getTemplate
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '403':
          description: Not allowed to view this template
    put:
      tags: [Projects & Templates]
      summary: Update template metadata
      operationId: updateTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateMeta'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
    delete:
      tags: [Projects & Templates]
      summary: Delete a template
      operationId: deleteTemplate
      responses:
        '200':
          description: Deleted

  /api/templates/from-rule/{rule_id}:
    parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      tags: [Projects & Templates]
      summary: Save an existing rule as a reusable template
      operationId: saveRuleTemplate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveTemplateRequest'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'

  /api/templates/from-channel/{channel_id}:
    parameters:
      - name: channel_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      tags: [Projects & Templates]
      summary: Save a channel (and its rules) as a reusable template
      operationId: saveChannelTemplate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveTemplateRequest'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'

  /api/templates/{id}/apply:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      tags: [Projects & Templates]
      summary: Apply a template
      description: Always creates new rows owned by the caller. A `rule` template needs `target_channel_id`; a `channel` template creates a fresh channel (name de-duplicated) in the caller's group(s).
      operationId: applyTemplate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyTemplateRequest'
      responses:
        '200':
          description: Applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplyResult'