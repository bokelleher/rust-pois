  # ========== Event Endpoints ==========
  /api/events:
    get:
      tags: [Events]
      summary: Query events
      description: Query processed signal events with optional filters
      operationId: listEvents
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: channel_id
          in: query
          schema:
            type: integer
            format: int64
        - name: action
          in: query
          schema:
            type: string
            enum: [pass, modify, replace, delete]
        - name: since
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'

  /api/events/stats:
    get:
      tags: [Events]
      summary: Get event statistics
      description: Get aggregate statistics about processed events
      operationId: getEventStats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Event statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventStats'

  /api/events/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
